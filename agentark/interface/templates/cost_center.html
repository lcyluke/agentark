<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💰 Apex 成本控制中心</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#0a0e17;--bg-secondary:#111827;--bg-card:#151d2b;
  --bg-hover:#1a2332;--border:#1e2d45;--border-light:#2a3f5a;
  --text-primary:#e8edf5;--text-secondary:#8899b4;--text-muted:#5a6f8a;
  --accent:#3b82f6;--accent-light:#60a5fa;
  --green:#22c55e;--yellow:#eab308;--red:#ef4444;--orange:#f97316;
  --purple:#a855f7;--cyan:#06b6d4;--pink:#ec4899;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg-primary);color:var(--text-primary);
  padding:20px 28px;line-height:1.5;font-size:14px;
}
h1{font-size:22px;margin-bottom:4px}
h2{font-size:16px;margin-bottom:10px}
.subtitle{color:var(--text-muted);font-size:13px;margin-bottom:24px}

/* Summary Cards */
.summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:24px}
.summary-card{
  background:var(--bg-card);border-radius:var(--radius);padding:16px 18px;
  border:1px solid var(--border);transition:all 0.3s;
}
.summary-card:hover{border-color:var(--border-light);transform:translateY(-2px)}
.summary-card .label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px}
.summary-card .value{font-size:28px;font-weight:700;margin:6px 0}
.summary-card .sub{font-size:11px;color:var(--text-secondary)}

/* Panels */
.panels{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
@media(max-width:1000px){.panels{grid-template-columns:1fr}}
.panel{
  background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border);
  padding:18px 20px;
}
.panel-title{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* Tables */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 12px;text-align:left;color:var(--text-muted);font-weight:500;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase}
td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text-secondary)}
tr:hover td{background:var(--bg-hover);color:var(--text-primary)}
.cost-value{font-weight:600;font-variant-numeric:tabular-nums}
.cost-high{color:var(--red)}
.cost-mid{color:var(--yellow)}
.cost-low{color:var(--green)}

/* Bars */
.bar{height:6px;background:var(--bg-secondary);border-radius:3px;overflow:hidden;margin-top:6px}
.bar-fill{height:100%;border-radius:3px;transition:width 1.2s ease}
.bar-fill.green{background:var(--green)}
.bar-fill.yellow{background:var(--yellow)}
.bar-fill.red{background:var(--red)}
.bar-fill.blue{background:var(--accent)}
.bar-fill.purple{background:var(--purple)}

/* Badges */
.badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500}
.badge-green{background:rgba(34,197,94,0.12);color:var(--green)}
.badge-yellow{background:rgba(234,179,8,0.12);color:var(--yellow)}
.badge-red{background:rgba(239,68,68,0.12);color:var(--red)}
.badge-blue{background:rgba(59,130,246,0.12);color:var(--accent-light)}
.badge-purple{background:rgba(168,85,247,0.12);color:var(--purple)}

/* Charts */
.chart-canvas{width:100%;height:180px;display:block}
.chart-legend{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap;font-size:11px;color:var(--text-muted)}
.legend-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--text-muted)}
.loading-spin{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error{color:var(--red);text-align:center;padding:20px}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{padding:8px 20px;cursor:pointer;font-size:13px;color:var(--text-muted);border-bottom:2px solid transparent;transition:all 0.2s}
.tab:hover{color:var(--text-primary)}
.tab.active{color:var(--accent-light);border-bottom-color:var(--accent-light)}

/* Refresh */
.refresh-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.refresh-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);cursor:pointer;font-size:12px;transition:all 0.2s}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent-light)}
.last-update{font-size:11px;color:var(--text-muted)}
</style>
</head>
<body>

<div class="refresh-bar">
  <h1>💰 成本控制中心</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="last-update" id="lastUpdate">—</span>
    <button class="refresh-btn" onclick="loadAll()">🔄 刷新</button>
  </div>
</div>

<!-- Summary -->
<div class="summary-row" id="summaryRow"></div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('cron')">📋 定时任务成本</div>
  <div class="tab" onclick="switchTab('agent')">🤖 Agent成本</div>
  <div class="tab" onclick="switchTab('project')">📦 项目成本</div>
  <div class="tab" onclick="switchTab('trend')">📈 趋势</div>
</div>

<!-- Tab: Cron Jobs -->
<div id="tab-cron" class="tab-content">
  <div class="panels">
    <div class="panel">
      <div class="panel-title">📋 定时任务成本排行 <span class="badge badge-blue">30天</span></div>
      <div class="table-wrap" id="cronTable"></div>
    </div>
    <div class="panel">
      <div class="panel-title">📊 按来源渠道分解</div>
      <canvas class="chart-canvas" id="sourceChart"></canvas>
      <div class="chart-legend" id="sourceLegend"></div>
    </div>
  </div>
</div>

<!-- Tab: Agent Costs -->
<div id="tab-agent" class="tab-content" style="display:none">
  <div class="panel">
    <div class="panel-title">🤖 Agent Profile 成本排行 <span class="badge badge-purple">30天</span></div>
    <div class="table-wrap" id="agentTable"></div>
  </div>
</div>

<!-- Tab: Project Costs -->
<div id="tab-project" class="tab-content" style="display:none">
  <div class="panel">
    <div class="panel-title">📦 项目成本分配</div>
    <div class="table-wrap" id="projectTable"></div>
  </div>
</div>

<!-- Tab: Trend -->
<div id="tab-trend" class="tab-content" style="display:none">
  <div class="panel">
    <div class="panel-title">📈 7天成本趋势</div>
    <canvas class="chart-canvas" id="trendChart" style="height:250px"></canvas>
  </div>
</div>

<script>
const API = '/api/cost';

let currentTab = 'cron';

function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  document.querySelector(`.tab:nth-child(${
    ['cron','agent','project','trend'].indexOf(name)+1
  })`).classList.add('active');
  document.getElementById(`tab-${name}`).style.display = 'block';
}

function fmt(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return n.toString();
}

function costClass(v) {
  if (v > 1) return 'cost-high';
  if (v > 0.1) return 'cost-mid';
  return 'cost-low';
}

function renderSummary(data) {
  const s = data.summary || {};
  const cards = [
    {l:'今日成本', v:'$'+s.today_cost?.toFixed(4), s:(s.today_sessions||0)+' 会话 · '+fmt(s.today_tokens||0)+' tokens', bar:s.monthly_estimate ? (s.today_cost/s.monthly_estimate*100).toFixed(1)+'%' : ''},
    {l:'本周成本', v:'$'+s.week_cost?.toFixed(4), s:(s.week_sessions||0)+' 会话 · '+fmt(s.week_tokens||0)+' tokens', bar:''},
    {l:'30天成本', v:'$'+s.d30_cost?.toFixed(4), s:(s.d30_sessions||0)+' 会话 · '+fmt(s.d30_tokens||0)+' tokens', bar:''},
    {l:'累计成本', v:'$'+s.total_cost?.toFixed(4), s:fmt(s.total_tokens||0)+' tokens · '+(s.total_sessions||0)+' 会话', bar:''},
    {l:'日均成本', v:'$'+s.daily_avg_30d?.toFixed(4), s:'过去30天平均', bar:''},
    {l:'预估月成本', v:'$'+s.monthly_estimate?.toFixed(4), s:'基于30天数据', bar:''},
  ];
  document.getElementById('summaryRow').innerHTML = cards.map(c => `
    <div class="summary-card">
      <div class="label">${c.l}</div>
      <div class="value">${c.v}</div>
      <div class="sub">${c.s}</div>
      ${c.bar ? `<div class="bar"><div class="bar-fill blue" style="width:${Math.min(parseFloat(c.bar),100)}%"></div></div>` : ''}
    </div>
  `).join('');
}

function renderCronTable(data) {
  const jobs = data.cron_jobs || [];
  if (!jobs.length) return document.getElementById('cronTable').innerHTML = '<div class="loading">暂无数据</div>';
  document.getElementById('cronTable').innerHTML = `
    <table>
      <thead><tr><th>任务名</th><th>频率</th><th>运行次数</th><th>Tokens</th><th>30天成本</th><th>均次成本</th><th>最后运行</th></tr></thead>
      <tbody>${jobs.map(j => `
        <tr>
          <td style="color:var(--text-primary);font-weight:500">${j.name||'—'}</td>
          <td>${j.schedule||'—'}</td>
          <td>${j.sessions}</td>
          <td>${fmt(j.input_tokens+j.output_tokens)}</td>
          <td class="cost-value ${costClass(j.estimated_cost)}">$${j.estimated_cost.toFixed(4)}</td>
          <td>$${j.avg_cost_per_run.toFixed(6)}</td>
          <td style="font-size:11px">${j.last_run||'—'}</td>
        </tr>
      `).join('')}</tbody>
    </table>
  `;
}

function renderAgentTable(data) {
  const agents = data.agents || [];
  if (!agents.length) return document.getElementById('agentTable').innerHTML = '<div class="loading">暂无数据</div>';
  document.getElementById('agentTable').innerHTML = `
    <table>
      <thead><tr><th>Agent</th><th>会话数</th><th>Tokens</th><th>30天成本</th><th>来源分布</th></tr></thead>
      <tbody>${agents.map(a => `
        <tr>
          <td style="color:var(--text-primary);font-weight:500">${a.profile||'—'}</td>
          <td>${a.sessions}</td>
          <td>${fmt(a.input_tokens+a.output_tokens)}</td>
          <td class="cost-value ${costClass(a.estimated_cost)}">$${a.estimated_cost?.toFixed(4)}</td>
          <td style="font-size:11px">${Object.entries(a.sources||{}).map(([k,v])=>`${k}:${v}`).join(' · ')}</td>
        </tr>
      `).join('')}</tbody>
    </table>
  `;
}

function renderProjectTable(data) {
  const projects = data.projects || data;
  if (!projects.length) return document.getElementById('projectTable').innerHTML = '<div class="loading">暂无数据</div>';
  const maxCost = Math.max(...projects.map(p=>p.total_cost||0), 0.01);
  document.getElementById('projectTable').innerHTML = `
    <table>
      <thead><tr><th>项目</th><th>会话</th><th>Cron成本</th><th>交互成本</th><th>总成本</th><th>预算使用</th></tr></thead>
      <tbody>${projects.map(p => `
        <tr>
          <td style="color:var(--text-primary);font-weight:500">${p.emoji||''} ${p.name||'—'}</td>
          <td>${p.sessions||0}</td>
          <td>$${(p.cron_cost||0).toFixed(4)}</td>
          <td>$${(p.interactive_cost||0).toFixed(4)}</td>
          <td class="cost-value ${costClass(p.total_cost)}">$${(p.total_cost||0).toFixed(4)}</td>
          <td>
            <div style="display:flex;align-items:center;gap:6px">
              <div style="flex:1;height:6px;background:var(--bg-secondary);border-radius:3px;overflow:hidden">
                <div style="height:100%;background:${(p.budget_used_pct||0)>80?'var(--red)':(p.budget_used_pct||0)>50?'var(--yellow)':'var(--green)'};width:${Math.min(p.budget_used_pct||0,100)}%"></div>
              </div>
              <span style="font-size:11px">${(p.budget_used_pct||0).toFixed(1)}%</span>
            </div>
          </td>
        </tr>
      `).join('')}</tbody>
    </table>
  `;
}

function renderSourceChart(data) {
  const sources = data.source_breakdown || [];
  const canvas = document.getElementById('sourceChart');
  const legend = document.getElementById('sourceLegend');
  if (!canvas || !sources.length) return;

  const ctx = canvas.getContext('2d');
  const colors = ['#3b82f6','#a855f7','#22c55e','#f97316','#ec4899','#06b6d4'];
  const total = sources.reduce((s,x)=>s+(x.cost||0), 0) || 1;

  // Simple horizontal bar chart
  const w = canvas.width = canvas.parentElement.clientWidth - 40;
  const h = canvas.height = sources.length * 36 + 20;
  canvas.style.height = h + 'px';

  ctx.clearRect(0,0,w,h);
  const barH = 26, gap = 10, maxW = w - 180;

  sources.forEach((s,i) => {
    const y = i * (barH + gap) + 10;
    const pct = (s.cost||0) / total;
    const bw = Math.max(pct * maxW, 2);

    // Label
    ctx.fillStyle = '#8899b4';
    ctx.font = '11px -apple-system, sans-serif';
    ctx.fillText(s.source||'unknown', 0, y + 17);

    // Bar
    ctx.fillStyle = colors[i % colors.length];
    ctx.fillRect(140, y, bw, barH);

    // Value
    ctx.fillStyle = '#e8edf5';
    ctx.fillText('$'+(s.cost||0).toFixed(4) + ' (' + (pct*100).toFixed(0) + '%)', 140 + bw + 6, y + 17);
  });

  legend.innerHTML = sources.map((s,i) => `
    <span><span class="legend-dot" style="background:${colors[i%colors.length]}"></span>${s.source||'unknown'}: $${(s.cost||0).toFixed(4)}</span>
  `).join('');
}

function renderTrendChart(data) {
  const trend = data.daily_trend || [];
  const canvas = document.getElementById('trendChart');
  if (!canvas || !trend.length) return;

  const ctx = canvas.getContext('2d');
  const w = canvas.width = canvas.parentElement.clientWidth - 40;
  const h = canvas.height = 250;
  const pad = {t:20,r:40,b:40,l:60};
  const pw = w - pad.l - pad.r, ph = h - pad.t - pad.b;

  ctx.clearRect(0,0,w,h);

  // Axes
  ctx.strokeStyle = '#1e2d45';
  ctx.beginPath();
  ctx.moveTo(pad.l, pad.t);
  ctx.lineTo(pad.l, h - pad.b);
  ctx.lineTo(w - pad.r, h - pad.b);
  ctx.stroke();

  const maxCost = Math.max(...trend.map(t=>t.cost||0), 0.01);
  const maxTok = Math.max(...trend.map(t=>t.tokens||0), 1);

  // Bars for tokens, line for cost
  const barW = Math.max(pw / trend.length * 0.6, 4);
  const gap = pw / trend.length;

  // Token bars
  trend.forEach((t,i) => {
    const x = pad.l + i * gap + (gap - barW) / 2;
    const bh = (t.tokens||0) / maxTok * ph * 0.7;
    ctx.fillStyle = 'rgba(59,130,246,0.4)';
    ctx.fillRect(x, h - pad.b - bh, barW, bh);
  });

  // Cost line
  ctx.strokeStyle = '#22c55e';
  ctx.lineWidth = 2;
  ctx.beginPath();
  trend.forEach((t,i) => {
    const x = pad.l + i * gap + gap / 2;
    const y = h - pad.b - ((t.cost||0) / maxCost * ph);
    if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Cost dots
  trend.forEach((t,i) => {
    const x = pad.l + i * gap + gap / 2;
    const y = h - pad.b - ((t.cost||0) / maxCost * ph);
    ctx.fillStyle = '#22c55e';
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI*2);
    ctx.fill();
  });

  // Labels
  ctx.fillStyle = '#5a6f8a';
  ctx.font = '10px -apple-system, sans-serif';
  trend.forEach((t,i) => {
    if (i % Math.ceil(trend.length/7) === 0 || trend.length <= 7) {
      const x = pad.l + i * gap + gap/2;
      ctx.fillText(t.label||'', x - 20, h - pad.b + 15);
    }
  });

  // Legend
  ctx.fillStyle = '#22c55e';
  ctx.fillText('─ 成本($)', w - pad.r - 100, pad.t);
  ctx.fillStyle = 'rgba(59,130,246,0.7)';
  ctx.fillText('▇ Token量', w - pad.r - 100, pad.t + 16);
}

async function loadAll() {
  try {
    const res = await fetch(API + '/full');
    if (!res.ok) throw new Error('API error: '+res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    renderSummary(data);
    renderCronTable(data);
    renderAgentTable(data);
    renderSourceChart(data);
    renderTrendChart(data);

    // Load projects
    try {
      const projRes = await fetch(API + '/projects');
      const projects = await projRes.json();
      renderProjectTable(projects);
    } catch(e) {}

    document.getElementById('lastUpdate').textContent = '更新于 ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('summaryRow').innerHTML = `<div class="error">加载失败: ${e.message}</div>`;
  }
}

loadAll();
// Auto refresh every 30s
setInterval(loadAll, 30000);
</script>
</body>
</html>
