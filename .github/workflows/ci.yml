name: Apex CI/CD

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Create venv and install dependencies
      run: |
        uv venv
        source .venv/bin/activate
        uv pip install -e ".[web]"
        uv pip install pytest pytest-cov

    - name: Lint with ruff
      run: |
        source .venv/bin/activate
        uv pip install ruff
        ruff check agentark/ --ignore E501 --exit-zero

    - name: Test with pytest
      run: |
        source .venv/bin/activate
        pytest -v --tb=short --cov=agentark --cov-report=term-missing

    - name: Generate coverage summary
      run: |
        source .venv/bin/activate
        coverage report --format=markdown --skip-covered > coverage_summary.md
        echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
        cat coverage_summary.md >> $GITHUB_STEP_SUMMARY

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install hatchling
      run: |
        python -m pip install --upgrade pip
        pip install hatchling

    - name: Build package
      run: python -m hatchling build

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      run: |
        pip install twine
        twine upload dist/*
