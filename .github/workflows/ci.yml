name: Apex CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        uv venv
        source .venv/bin/activate
        uv pip install -e ".[dev]"

    - name: Lint with ruff
      run: |
        source .venv/bin/activate
        uv pip install ruff
        ruff check apex/ --ignore E501 --exit-zero

    - name: Import test
      run: |
        source .venv/bin/activate
        python -c "from apex.core.profile import Profile, ProfileManager; print('✅ Profile OK')"
        python -c "from apex.core.runtime import Agent; print('✅ Runtime OK')"
        python -c "from apex.core.knowledge import KnowledgeGraph; print('✅ KnowledgeGraph OK')"
        python -c "from apex.core.evolution import EvolutionEngine; print('✅ Evolution OK')"
        python -c "from apex.providers import registry; print('✅ Providers OK')"
        python -c "from apex.orchestration.kanban import Kanban; print('✅ Kanban OK')"
        python -c "from apex.orchestration.crew import Crew; print('✅ Crew OK')"
        python -c "from apex.orchestration.healing import SelfHealingExecutor; print('✅ Healing OK')"
        python -c "from apex.mcp.hub import hub; print(f'✅ MCP Hub: {len(hub.list_tools())} tools')"
        python -c "from apex.economy import BudgetManager, TokenRouter; print('✅ Economy OK')"

    - name: Test CLI
      run: |
        source .venv/bin/activate
        apex --help
        DEEPSEEK_API_KEY="test-key" apex run "hello" 2>&1 || echo "⚠️ API call expected to fail without real key"
        apex status

  publish:
    needs: test
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install build tools
      run: |
        python -m pip install build twine

    - name: Build package
      run: python -m build

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      run: twine upload dist/*
